<html lang="en">
    <head>
        <meta http-equiv="Content-Type" content="text/html; charset=UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>
        Tic Tac Toe
    </title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #ffffcc;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
        }
        .container {
            text-align: center;
        }
        h1 {
            color: #333;
        }
        .board {
            display: grid;
            grid-template-columns: repeat(3, 100px);
            grid-gap: 5px;
            margin: 20px 0;
            background-color: yellow; /* Added background color */
            padding: 10px; /* Added padding for better appearance */
        }
        .cell {
            width: 100px;
            height: 100px;
            background-color: #fff;
            border: 2px solid #33cc33;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2em;
            cursor: pointer;
        }
        #winner-display {
            color: #333;
            font-size: 1.5em;
            margin-bottom: 10px;
        }
        button {
            background-color: #333;
            color: #fff;
            padding: 10px 20px;
            font-size: 1em;
            border: none;
            cursor: pointer;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1><B><U><I>Tic Tac Toe</I></U></B></h1>
        <div id="winner-display"></div>
        <div class="board">
            <div class="cell" onclick="handleMove(this)" style="background-color: rgb(255, 255, 255);"></div>
            <div class="cell" onclick="handleMove(this)" style="background-color: rgb(255, 255, 255);"></div>
            <div class="cell" onclick="handleMove(this)" style="background-color: rgb(255, 255, 255);"></div>
            <div class="cell" onclick="handleMove(this)" style="background-color: rgb(255, 255, 255);"></div>
            <div class="cell" onclick="handleMove(this)" style="background-color: rgb(248, 248, 248);"></div>
            <div class="cell" onclick="handleMove(this)" style="background-color: rgb(255, 255, 255);"></div>
            <div class="cell" onclick="handleMove(this)" style="background-color: rgb(255, 255, 255);"></div>
            <div class="cell" onclick="handleMove(this)" style="background-color: rgb(255, 255, 255);"></div>
            <div class="cell" onclick="handleMove(this)" style="background-color: rgb(255, 255, 255);"></div>
        </div>
        <button onclick="resetGame()">New Game</button>
    </div>
    <script>
        let currentPlayer = 'X';
        let gameBoard = ['', '', '', '', '', '', '', '', ''];
        let gameActive = true;
        function handleMove(cell) {
            const index = Array.from(cell.parentNode.children).indexOf(cell);

            if (gameBoard[index] === '' && gameActive) {
                gameBoard[index] = currentPlayer;
                cell.textContent = currentPlayer;
                if (checkWinner()) {
                    document.getElementById('winner-display').textContent = `${currentPlayer} wins!`;
                    gameActive = false;
                } else if (gameBoard.every((cell) => cell !== '')) {
                    document.getElementById('winner-display').textContent = 'It\'s a tie!';
                    gameActive = false;
                } else {
                    currentPlayer = currentPlayer === 'X' ? 'O' : 'X';
             
             
             
             
             
                }
            }
        }
        function checkWinner() {
            const winPatterns = [
                [0, 1, 2], [3, 4, 5], [6, 7, 8], // Rows
                [0, 3, 6], [1, 4, 7], [2, 5, 8], // Columns
                [0, 4, 8], [2, 4, 6]             // Diagonals
            ];
            for (const pattern of winPatterns) {
                const [a, b, c] = pattern;
                if (gameBoard[a] && gameBoard[a] === gameBoard[b] && gameBoard[a] === gameBoard[c]) {
                    highlightWinningCells(pattern);
                    return true;
                }
            }
            return false;
        }
        function highlightWinningCells(cells) {
            for (const index of cells) {
                document.querySelector(`.board .cell:nth-child(${index + 1})`).style.backgroundColor = '#33cc33';
            }
        }
        function resetGame() {
            gameBoard = ['', '', '', '', '', '', '', '', ''];
            gameActive = true;
            currentPlayer = 'X';
            document.getElementById('winner-display').textContent = '';
            document.querySelectorAll('.board .cell').forEach(cell => {
                cell.textContent = '';
                cell.style.backgroundColor = '#fff';
            });
        }
    </script>
</body></html>
